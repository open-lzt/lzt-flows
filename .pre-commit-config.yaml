# Local dev gate for the module catalog. No root uv project here, so ruff comes from its own mirror
# (not `uv run`), and the manifests are syntax-checked. One-time per clone: pre-commit install
# CI (validate.yml) stays the authoritative gate on incoming PRs.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml        # module.yaml, authors.yml
      - id: check-json        # flow.json, index.json, module manifests
      - id: end-of-file-fixer
      - id: trailing-whitespace
