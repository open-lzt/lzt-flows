schema_version: 1
name: steam-autobuy
version: 2.1.0
author: zlexdev
kind: flow
description: |-
  Автопокупка Steam-аккаунтов: поиск с потолком цены, отсечка по количеству, покупка каждого.
  Цена, количество и холостой прогон — параметры флоу, а не константы в графе.
  dry_run включён по умолчанию: выключите его, когда доверитесь фильтрам.
requires_nodes:
  - market.search
  - logic.condition
  - logic.take
  - logic.for_each_lot
  - market.fast_buy
