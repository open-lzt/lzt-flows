schema_version: 1
name: bump-daily
version: 1.1.0
author: zlexdev
description: >-
  Поднимает все лоты аккаунта — сам, по расписанию, без ручного запуска.
  Требует явно указанного аккаунта: get_my_lots читает лоты того токена, под которым выполняется,
  поэтому без привязки он бы листал чужие — и отказывается работать вместо этого.
  install-flow.sh подставит account_ref сам (--account, либо единственный активный аккаунт).
requires_nodes:
  - logic.get_my_lots
  - logic.for_each_lot
  - market.bump
schedule:
  # Каждые 4 часа. Это не «раз в сутки», хотя модуль так называется: маркет разрешает поднимать
  # лот заметно чаще суток, а поднятие — это то, ради чего у лота вообще есть шанс попасться на
  # глаза. Слишком частый прогон ничего не ломает: лот, который поднимать ещё рано, маркет просто
  # не поднимет.
  # Перекрывается на установке: install-flow.sh --cron '<выражение>'.
  cron: "0 */4 * * *"
